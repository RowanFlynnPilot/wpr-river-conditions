name: Fetch Data & Deploy

on:
  schedule:
    - cron: '*/30 10-4 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch river data
        run: python3 scripts/fetch_data.py

      - name: Copy data to public dir for build
        run: |
          mkdir -p public/data
          cp src/data/river-data.json public/data/river-data.json

      - name: Build
        run: npm run build

      - name: Copy data to dist
        run: cp src/data/river-data.json dist/data/river-data.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
